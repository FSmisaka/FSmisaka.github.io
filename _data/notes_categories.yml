# Notes categories — extensible: add a new entry to create a new category.
# Each category needs:
#   name  – display name shown on the card
#   slug  – used in note frontmatter `category` field and for filtering
#   icon  – emoji or short text displayed on the Switch-style card
#   color – card background gradient target (soft pastel recommended)
#
# Example new category:
#   - name: "Computer Vision"
#     slug: "computer-vision"
#     icon: "👁️"
#     color: "#e8f0e8"

- name: "Machine Learning"
  slug: "machine-learning"
  icon: "🧠"
  color: "#dceaf6"

- name: "Recommendation Systems"
  slug: "recommendation-systems"
  icon: "🎯"
  color: "#fef3e4"

- name: "LLMs"
  slug: "llms"
  icon: "🤖"
  color: "#ede4f6"
